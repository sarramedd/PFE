spring.application.name=GestionProjet

# ==================== Datasource ====================
# DEV LOCAL (XAMPP MySQL) : valeurs par defaut ci-dessous.
#   - Demarrer MySQL depuis le panneau XAMPP
#   - Creer la DB "gestionprojet" depuis phpMyAdmin (ou Hibernate la cree si privilege)
#
# AZURE (AKS PostgreSQL) : override des 5 variables ci-dessous via un Kubernetes Secret :
#   SPRING_DATASOURCE_URL=jdbc:postgresql://<postgres_fqdn>:5432/gestion_projet?sslmode=require
#   SPRING_DATASOURCE_USERNAME=<admin_user>
#   SPRING_DATASOURCE_PASSWORD=<admin_password>
#   SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
#   SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/gestionprojet?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# ==================== JPA / Hibernate ====================
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

server.port=8088
