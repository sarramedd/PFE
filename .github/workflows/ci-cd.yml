name: TeamFlow CI/CD Pipeline with AI Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  ACR_REGISTRY: acrpfedev.azurecr.io
  BACKEND_IMAGE: acrpfedev.azurecr.io/gestion-projet-backend
  FRONTEND_IMAGE: acrpfedev.azurecr.io/gestion-projet-frontend
  BACKEND_DIR: GestionProjet
  FRONTEND_DIR: gestion-projet-frontend

# =============================================================================
# JOB 1 — Build & Test Backend Spring Boot
# =============================================================================
jobs:
  build-backend:
    name: "🔧 Build & Test Backend"
    runs-on: ubuntu-latest
    outputs:
      test-passed: ${{ steps.tests.outputs.passed }}
      test-failed: ${{ steps.tests.outputs.failed }}
      build-duration: ${{ steps.duration.outputs.duration }}
      build-status: ${{ steps.build.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Record start time
        id: start
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Build with Maven
        id: build
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          mvn clean package -DskipTests
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Run Tests
        id: tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          mvn test || true
          PASSED=$(find target/surefire-reports -name "*.xml" 2>/dev/null | \
            xargs grep -h 'tests=' 2>/dev/null | \
            grep -o 'tests="[0-9]*"' | \
            grep -o '[0-9]*' | \
            awk '{sum+=$1} END {print sum+0}')
          FAILED=$(find target/surefire-reports -name "*.xml" 2>/dev/null | \
            xargs grep -h 'failures=' 2>/dev/null | \
            grep -o 'failures="[0-9]*"' | \
            grep -o '[0-9]*' | \
            awk '{sum+=$1} END {print sum+0}')
          echo "passed=${PASSED:-0}" >> $GITHUB_OUTPUT
          echo "failed=${FAILED:-0}" >> $GITHUB_OUTPUT

      - name: Calculate duration
        id: duration
        run: |
          END=$(date +%s)
          DURATION=$((END - ${{ steps.start.outputs.start }}))
          echo "duration=${DURATION}s" >> $GITHUB_OUTPUT

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: ${{ env.BACKEND_DIR }}/target/*.jar
          retention-days: 1

# =============================================================================
# JOB 2 — Build Frontend Angular
# =============================================================================
  build-frontend:
    name: "🎨 Build Frontend Angular"
    runs-on: ubuntu-latest
    outputs:
      build-duration: ${{ steps.duration.outputs.duration }}
      build-status: ${{ steps.build.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Record start time
        id: start
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci --legacy-peer-deps

      - name: Build Angular (Production)
        id: build
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          npm run build -- --configuration=production
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Calculate duration
        id: duration
        run: |
          END=$(date +%s)
          DURATION=$((END - ${{ steps.start.outputs.start }}))
          echo "duration=${DURATION}s" >> $GITHUB_OUTPUT

# =============================================================================
# JOB 3 — Build & Push Docker Images vers ACR
# =============================================================================
  build-docker:
    name: "🐳 Build & Push Docker Images"
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build \
            -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.BACKEND_IMAGE }}:latest \
            ${{ env.BACKEND_DIR }}/

      - name: Build Frontend Image
        run: |
          docker build \
            -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.FRONTEND_IMAGE }}:latest \
            ${{ env.FRONTEND_DIR }}/

      - name: Push Backend Image
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Push Frontend Image
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

# =============================================================================
# JOB 4 — Security Scan (Trivy)
# =============================================================================
  security-scan:
    name: "🔒 Security Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: [build-docker]
    outputs:
      critical-cves: ${{ steps.parse.outputs.critical }}
      high-cves: ${{ steps.parse.outputs.high }}
      medium-cves: ${{ steps.parse.outputs.medium }}
    steps:
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Scan Backend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: 'json'
          output: 'trivy-backend.json'
          exit-code: '0'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Parse Trivy Results
        id: parse
        run: |
          python3 << 'EOF'
          import json, os

          with open('trivy-backend.json') as f:
              data = json.load(f)

          vulns = [v for r in data.get('Results', []) for v in r.get('Vulnerabilities', []) or []]
          critical = len([v for v in vulns if v.get('Severity') == 'CRITICAL'])
          high = len([v for v in vulns if v.get('Severity') == 'HIGH'])
          medium = len([v for v in vulns if v.get('Severity') == 'MEDIUM'])

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"critical={critical}\n")
              f.write(f"high={high}\n")
              f.write(f"medium={medium}\n")

          print(f"CVEs - Critical: {critical}, High: {high}, Medium: {medium}")
          EOF

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-backend.json
          retention-days: 7

      - name: Block on Critical CVEs
        run: |
          if [ "${{ steps.parse.outputs.critical }}" -gt "5" ]; then
            echo "🔴 BLOQUÉ: ${{ steps.parse.outputs.critical }} CVEs critiques détectées!"
            exit 1
          fi

# =============================================================================
# JOB 5 — AI Analysis: Métriques Pipeline + Risk Assessment (Gemini)
# Combinaison 2 + 3
# =============================================================================
  ai-analysis:
    name: "🤖 AI Pipeline Analysis (Gemini)"
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, security-scan]
    outputs:
      risk-level: ${{ steps.gemini.outputs.risk_level }}
      deploy-decision: ${{ steps.gemini.outputs.deploy_decision }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Collect Pipeline Metrics
        id: metrics
        run: |
          # Git metrics
          FILES_CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | wc -l || echo "1")
          LINES_ADDED=$(git diff --stat HEAD~1 HEAD 2>/dev/null | tail -1 | grep -o '[0-9]* insertion' | grep -o '[0-9]*' || echo "0")
          LINES_DELETED=$(git diff --stat HEAD~1 HEAD 2>/dev/null | tail -1 | grep -o '[0-9]* deletion' | grep -o '[0-9]*' || echo "0")
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)

          # Time metrics (risque si vendredi après 16h ou weekend)
          HOUR=$(date +%H)
          DAY_NUM=$(date +%u)  # 1=Lundi, 5=Vendredi, 6=Samedi, 7=Dimanche

          # Risk factors
          IS_WEEKEND=$([ "$DAY_NUM" -ge 6 ] && echo "true" || echo "false")
          IS_END_OF_DAY=$([ "$HOUR" -ge 16 ] && echo "true" || echo "false")
          IS_FRIDAY=$([ "$DAY_NUM" -eq 5 ] && echo "true" || echo "false")

          echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT
          echo "lines_added=$LINES_ADDED" >> $GITHUB_OUTPUT
          echo "lines_deleted=$LINES_DELETED" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "hour=$HOUR" >> $GITHUB_OUTPUT
          echo "day_num=$DAY_NUM" >> $GITHUB_OUTPUT
          echo "is_weekend=$IS_WEEKEND" >> $GITHUB_OUTPUT
          echo "is_friday=$IS_FRIDAY" >> $GITHUB_OUTPUT
          echo "is_end_of_day=$IS_END_OF_DAY" >> $GITHUB_OUTPUT

      - name: Call Gemini API for Analysis
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, sys

          # ── Métriques collectées ──────────────────────────────────────────
          metrics = {
              "branch": os.environ.get("GITHUB_REF_NAME", "unknown"),
              "commit_sha": os.environ.get("GITHUB_SHA", "")[:8],
              "author": os.environ.get("GITHUB_ACTOR", "unknown"),
              "commit_message": "${{ steps.metrics.outputs.commit_msg }}",
              "files_changed": int("${{ steps.metrics.outputs.files_changed }}" or 0),
              "lines_added": int("${{ steps.metrics.outputs.lines_added }}" or 0),
              "lines_deleted": int("${{ steps.metrics.outputs.lines_deleted }}" or 0),
              "backend_tests_passed": int("${{ needs.build-backend.outputs.test-passed }}" or 0),
              "backend_tests_failed": int("${{ needs.build-backend.outputs.test-failed }}" or 0),
              "backend_build_duration": "${{ needs.build-backend.outputs.build-duration }}",
              "frontend_build_duration": "${{ needs.build-frontend.outputs.build-duration }}",
              "security_critical_cves": int("${{ needs.security-scan.outputs.critical-cves }}" or 0),
              "security_high_cves": int("${{ needs.security-scan.outputs.high-cves }}" or 0),
              "security_medium_cves": int("${{ needs.security-scan.outputs.medium-cves }}" or 0),
              "deploy_hour": int("${{ steps.metrics.outputs.hour }}" or 12),
              "deploy_day": int("${{ steps.metrics.outputs.day_num }}" or 1),
              "is_weekend": "${{ steps.metrics.outputs.is_weekend }}" == "true",
              "is_friday_afternoon": "${{ steps.metrics.outputs.is_friday }}" == "true" and int("${{ steps.metrics.outputs.hour }}" or 0) >= 14,
          }

          # ── Prompt Gemini ─────────────────────────────────────────────────
          prompt = f"""Tu es un expert AIOps spécialisé dans l'analyse de pipelines CI/CD.
          Analyse les métriques suivantes du pipeline TeamFlow et fournis une évaluation de risque de déploiement.

          === MÉTRIQUES DU PIPELINE ===
          Branche: {metrics['branch']}
          Commit: {metrics['commit_sha']} — "{metrics['commit_message']}"
          Auteur: {metrics['author']}

          === MÉTRIQUES DE BUILD ===
          - Fichiers modifiés: {metrics['files_changed']}
          - Lignes ajoutées: {metrics['lines_added']}
          - Lignes supprimées: {metrics['lines_deleted']}
          - Durée build backend: {metrics['backend_build_duration']}
          - Durée build frontend: {metrics['frontend_build_duration']}

          === MÉTRIQUES DE TESTS ===
          - Tests réussis: {metrics['backend_tests_passed']}
          - Tests échoués: {metrics['backend_tests_failed']}

          === MÉTRIQUES DE SÉCURITÉ (Trivy) ===
          - CVEs Critiques: {metrics['security_critical_cves']}
          - CVEs Élevées: {metrics['security_high_cves']}
          - CVEs Moyennes: {metrics['security_medium_cves']}

          === CONTEXTE DE DÉPLOIEMENT ===
          - Heure: {metrics['deploy_hour']}h
          - Jour: {metrics['deploy_day']} (1=Lundi, 7=Dimanche)
          - Weekend: {metrics['is_weekend']}
          - Vendredi après-midi: {metrics['is_friday_afternoon']}

          Réponds UNIQUEMENT avec un JSON valide (sans markdown) dans ce format exact:
          {{
            "risk_level": "LOW|MEDIUM|HIGH",
            "risk_score": <0-100>,
            "deploy_decision": "PROCEED|CAUTION|BLOCK",
            "summary": "<2-3 phrases en français>",
            "risk_factors": ["<facteur1>", "<facteur2>"],
            "recommendations": ["<rec1>", "<rec2>"],
            "pipeline_health": "<observation sur la santé globale du pipeline>"
          }}"""

          # ── Appel API Gemini ──────────────────────────────────────────────
          api_key = os.environ.get("GEMINI_API_KEY", "")
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={api_key}"

          payload = json.dumps({
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {"temperature": 0.3, "maxOutputTokens": 1024}
          }).encode()

          req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"})

          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  response = json.loads(resp.read())
              raw_text = response["candidates"][0]["content"]["parts"][0]["text"]
              raw_text = raw_text.replace("```json", "").replace("```", "").strip()
              ai_result = json.loads(raw_text)
          except Exception as e:
              print(f"Gemini API error: {e}", file=sys.stderr)
              ai_result = {
                  "risk_level": "MEDIUM",
                  "risk_score": 50,
                  "deploy_decision": "CAUTION",
                  "summary": "Analyse IA indisponible — évaluation manuelle requise.",
                  "risk_factors": ["API Gemini non accessible"],
                  "recommendations": ["Vérifier la clé API Gemini"],
                  "pipeline_health": "Inconnu"
              }

          # ── Emojis ───────────────────────────────────────────────────────
          risk_emoji = {"LOW": "🟢", "MEDIUM": "🟡", "HIGH": "🔴"}.get(ai_result["risk_level"], "⚪")
          decision_emoji = {"PROCEED": "✅", "CAUTION": "⚠️", "BLOCK": "🛑"}.get(ai_result["deploy_decision"], "❓")

          risk_factors_md = "\n".join([f"- {f}" for f in ai_result.get("risk_factors", [])])
          recommendations_md = "\n".join([f"- {r}" for r in ai_result.get("recommendations", [])])

          # ── Rapport Markdown ──────────────────────────────────────────────
          report = f"""## 🤖 TeamFlow AI Pipeline Analysis — Powered by Gemini

          ---

          ### {risk_emoji} Niveau de Risque: **{ai_result['risk_level']}** (Score: {ai_result['risk_score']}/100)
          ### {decision_emoji} Décision de déploiement: **{ai_result['deploy_decision']}**

          ---

          ### 📊 Métriques du Pipeline

          | Catégorie | Métrique | Valeur |
          |-----------|----------|--------|
          | 🔧 Code | Fichiers modifiés | {metrics['files_changed']} |
          | 🔧 Code | Lignes ajoutées | {metrics['lines_added']} |
          | 🔧 Code | Lignes supprimées | {metrics['lines_deleted']} |
          | ✅ Tests | Tests réussis | {metrics['backend_tests_passed']} |
          | ❌ Tests | Tests échoués | {metrics['backend_tests_failed']} |
          | 🔒 Sécu | CVEs Critiques | {metrics['security_critical_cves']} |
          | 🔒 Sécu | CVEs Élevées | {metrics['security_high_cves']} |
          | ⏱️ Build | Durée backend | {metrics['backend_build_duration']} |
          | 🕐 Timing | Heure déploiement | {metrics['deploy_hour']}h |

          ---

          ### 🧠 Analyse Gemini

          {ai_result['summary']}

          **Santé du pipeline:** {ai_result['pipeline_health']}

          ---

          ### ⚠️ Facteurs de Risque Identifiés

          {risk_factors_md}

          ---

          ### 💡 Recommandations

          {recommendations_md}

          ---
          *Analyse générée automatiquement par Gemini 1.5 Flash · Commit `{metrics['commit_sha']}` · {metrics['author']}*
          """

          # ── Sauvegarder le rapport ────────────────────────────────────────
          with open("ai_report.md", "w") as f:
              f.write(report)

          # ── GitHub Outputs ────────────────────────────────────────────────
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"risk_level={ai_result['risk_level']}\n")
              f.write(f"deploy_decision={ai_result['deploy_decision']}\n")
              f.write(f"risk_score={ai_result['risk_score']}\n")

          print(f"✅ AI Analysis complete — Risk: {ai_result['risk_level']}, Decision: {ai_result['deploy_decision']}")
          PYEOF

      - name: Post AI Report as PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('ai_report.md', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
            console.log('✅ AI report posted as PR comment');

      - name: Post AI Report as Commit Comment
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('ai_report.md', 'utf8');
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: report
            });
            console.log('✅ AI report posted as commit comment');

      - name: Upload AI Report
        uses: actions/upload-artifact@v4
        with:
          name: ai-analysis-report
          path: ai_report.md
          retention-days: 30

      - name: Block Deployment if HIGH Risk
        if: steps.gemini.outputs.deploy_decision == 'BLOCK'
        run: |
          echo "🛑 DÉPLOIEMENT BLOQUÉ par l'IA Gemini"
          echo "Niveau de risque: ${{ steps.gemini.outputs.risk_level }}"
          echo "Consulte le rapport AI pour les détails"
          exit 1

# =============================================================================
# JOB 6 — Deploy to DEV (automatique)
# =============================================================================
  deploy-dev:
    name: "🚀 Deploy to DEV"
    runs-on: ubuntu-latest
    needs: [ai-analysis]
    if: needs.ai-analysis.outputs.deploy-decision != 'BLOCK'
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl (Primary AKS)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRIMARY }}" | base64 -d > ~/.kube/config

      - name: Create DEV namespace
        run: kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to DEV
        run: |
          kubectl set image deployment/gestion-projet-backend \
            backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -n dev 2>/dev/null || echo "Deployment not found in dev, skipping image update"
          kubectl set image deployment/gestion-projet-frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -n dev 2>/dev/null || echo "Frontend not found in dev, skipping"

      - name: Verify DEV deployment
        run: |
          echo "✅ Deployed to DEV namespace"
          kubectl get pods -n dev 2>/dev/null || echo "No pods in dev yet"

# =============================================================================
# JOB 7 — Deploy to STAGING (approbation manuelle requise)
# =============================================================================
  deploy-staging:
    name: "🎯 Deploy to STAGING"
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRIMARY }}" | base64 -d > ~/.kube/config

      - name: Create STAGING namespace
        run: kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to STAGING
        run: |
          kubectl set image deployment/gestion-projet-backend \
            backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -n staging 2>/dev/null || echo "Skipping staging backend"
          kubectl set image deployment/gestion-projet-frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -n staging 2>/dev/null || echo "Skipping staging frontend"
          echo "✅ Deployed to STAGING"

# =============================================================================
# JOB 8 — Deploy to PRODUCTION avec Canary (approbation manuelle requise)
# =============================================================================
  deploy-prod:
    name: "🏭 Deploy to PROD (Canary)"
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRIMARY }}" | base64 -d > ~/.kube/config

      - name: "Canary Deploy — Phase 1 (1 replica = ~50%)"
        run: |
          echo "🐦 Phase Canary: déploiement sur 1 replica..."
          # Réduire les resources pour le node Standard_B2ls_v2 (2vCPU, 4GB)
          kubectl patch deployment gestion-projet-backend -n default --type=merge --patch '{
            "spec": {
              "template": {
                "spec": {
                  "containers": [{
                    "name": "backend",
                    "resources": {
                      "requests": {"cpu": "100m", "memory": "256Mi"},
                      "limits": {"cpu": "500m", "memory": "512Mi"}
                    }
                  }]
                }
              }
            }
          }'
          kubectl set image deployment/gestion-projet-backend \
            backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -n default
          kubectl scale deployment/gestion-projet-backend --replicas=1 -n default
          kubectl rollout status deployment/gestion-projet-backend -n default --timeout=300s

      - name: "Monitor Canary (90 secondes)"
        run: |
          echo "⏳ Monitoring du déploiement canary pendant 90s..."
          sleep 90
          READY=$(kubectl get deployment gestion-projet-backend -n default \
            -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
          echo "Replicas prêts: $READY"
          if [ "${READY}" = "0" ]; then
            echo "🔴 Canary échoué — rollback automatique"
            kubectl rollout undo deployment/gestion-projet-backend -n default
            exit 1
          fi

      - name: "Full Rollout — 100%"
        run: |
          echo "✅ Canary OK — déploiement complet"
          kubectl set image deployment/gestion-projet-frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -n default
          kubectl rollout status deployment/gestion-projet-frontend -n default --timeout=300s
          echo "🎉 Production mise à jour avec succès!"
          echo "Backend: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}"
          echo "Frontend: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}"
