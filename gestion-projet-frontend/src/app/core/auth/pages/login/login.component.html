<div class="tf-login-page" *ngIf="assetsReady">
  <div class="tf-login-card">

    <!-- Logo -->
    <div class="tf-brand">
      <img src="assets/images/teamflow-logo.svg" alt="TeamFlow" class="tf-logo" />
      <span class="tf-brand-name">Team<span class="tf-brand-accent">Flow</span></span>
    </div>

    <!-- Titre -->
    <div class="tf-heading">
      <h2 class="tf-title">{{ 'login.welcome' | tf }}</h2>
      <p class="tf-sub">{{ 'login.subtitle' | tf }}</p>
    </div>

    <!-- Formulaire -->
    <form (ngSubmit)="login()" autocomplete="off">

      <div class="tf-field">
        <label class="tf-label" for="email">{{ 'login.email' | tf }}</label>
        <div class="tf-input-wrap">
          <i class="bx bx-envelope tf-input-icon"></i>
          <input
            type="email"
            id="email"
            name="email"
            class="tf-input"
            [placeholder]="'login.emailPlaceholder' | tf"
            [(ngModel)]="email"
            required
            autofocus
          />
        </div>
      </div>

      <div class="tf-field">
        <label class="tf-label" for="password">{{ 'login.password' | tf }}</label>
        <div class="tf-input-wrap">
          <i class="bx bx-lock-alt tf-input-icon"></i>
          <input
            type="password"
            id="password"
            name="password"
            class="tf-input"
            [placeholder]="'login.passwordPlaceholder' | tf"
            [(ngModel)]="password"
            required
          />
        </div>
      </div>

      <div class="tf-error" *ngIf="errorMessage">
        <i class="bx bx-error-circle"></i>
        {{ errorMessage }}
      </div>

      <button class="tf-submit" type="submit" [disabled]="isSubmitting">
        <span *ngIf="isSubmitting" class="tf-spinner"></span>
        <span>{{ isSubmitting ? ('login.signingIn' | tf) : ('login.signIn' | tf) }}</span>
      </button>

      <div class="tf-forgot-row">
        <button type="button" class="tf-forgot-link" (click)="openForgotPassword()">
          {{ 'login.forgotPassword' | tf }}
        </button>
      </div>

    </form>

  <!-- Modal mot de passe oublié -->
  <div class="tf-modal-backdrop" *ngIf="showForgotPassword" (click)="closeForgotPassword()">
    <section class="tf-modal" (click)="$event.stopPropagation()">
      <div class="tf-modal-head">
        <div>
          <h5>{{ 'login.resetTitle' | tf }}</h5>
          <p>{{ 'login.resetSubtitle' | tf }}</p>
        </div>
        <button type="button" class="tf-modal-close" (click)="closeForgotPassword()">
          <i class="bx bx-x"></i>
        </button>
      </div>

      <div class="tf-modal-body">
        <div class="tf-field">
          <label class="tf-label">{{ 'login.email' | tf }}</label>
          <div class="tf-input-wrap">
            <i class="bx bx-envelope tf-input-icon"></i>
            <input class="tf-input" type="email" [(ngModel)]="forgotEmail" name="forgotEmail" placeholder="email@exemple.com" />
          </div>
        </div>

        <div *ngIf="forgotStep !== 'request'" class="tf-field">
          <label class="tf-label">{{ 'login.verifyCode' | tf }}</label>
          <div class="tf-input-wrap">
            <i class="bx bx-key tf-input-icon"></i>
            <input class="tf-input" type="text" maxlength="6" [(ngModel)]="verificationCode" name="verificationCode" placeholder="------" />
          </div>
        </div>

        <div *ngIf="forgotStep === 'reset'" class="tf-field">
          <label class="tf-label">{{ 'login.newPassword' | tf }}</label>
          <div class="tf-input-wrap">
            <i class="bx bx-lock-alt tf-input-icon"></i>
            <input class="tf-input" type="password" [(ngModel)]="newPassword" name="newPassword" minlength="8" [placeholder]="'login.passwordPlaceholder' | tf" />
          </div>
        </div>

        <div class="tf-alert tf-alert-success" *ngIf="forgotMessage">{{ forgotMessage }}</div>
        <div class="tf-alert tf-alert-error" *ngIf="forgotError">{{ forgotError }}</div>
      </div>

      <div class="tf-modal-foot">
        <button type="button" class="tf-btn-outline" (click)="closeForgotPassword()">{{ 'common.close' | tf }}</button>
        <button *ngIf="forgotStep === 'request'" type="button" class="tf-btn-primary"
                [disabled]="isRequestingReset || !forgotEmail.trim()" (click)="requestReset()">
          {{ isRequestingReset ? ('login.signingIn' | tf) : ('login.sendCode' | tf) }}
        </button>
        <button *ngIf="forgotStep === 'verify'" type="button" class="tf-btn-primary"
                [disabled]="isVerifyingCode || !forgotEmail.trim() || verificationCode.trim().length !== 6" (click)="verifyCode()">
          {{ isVerifyingCode ? ('login.signingIn' | tf) : ('login.verifyCode' | tf) }}
        </button>
        <button *ngIf="forgotStep === 'reset'" type="button" class="tf-btn-primary"
                [disabled]="isResettingPassword || !verificationCode.trim() || newPassword.trim().length < 8" (click)="submitReset()">
          {{ isResettingPassword ? ('login.signingIn' | tf) : ('login.resetPassword' | tf) }}
        </button>
      </div>
    </section>
  </div>

  </div>

  <!-- Langue -->
  <div class="tf-lang">
    <app-lang-switcher></app-lang-switcher>
  </div>
</div>
