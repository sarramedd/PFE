<aside id="layout-menu" class="layout-menu menu-vertical menu bg-menu-theme">
  <div class="app-brand demo">
    <a routerLink="/frontoffice/dashboard" class="app-brand-link">
      <span class="app-brand-logo demo">
        <img src="assets/images/teamflow.png" alt="TeamFlow" style="height: 38px; width: auto; object-fit: contain;" />
      </span>
      <span class="app-brand-text demo menu-text fw-bolder ms-2">TeamFlow</span>
    </a>

    <a href="javascript:void(0);" class="layout-menu-toggle menu-link text-large ms-auto d-block d-xl-none">
      <i class="bx bx-chevron-left bx-sm align-middle"></i>
    </a>
  </div>

  <div class="menu-inner-shadow"></div>

  <ul class="menu-inner py-1">
    <li class="menu-item" routerLinkActive="active">
      <a routerLink="/frontoffice/dashboard" class="menu-link">
        <i class="menu-icon tf-icons bx bx-home-circle"></i>
        <div>Dashboard</div>
      </a>
    </li>
    <li class="menu-item" routerLinkActive="active">
      <a routerLink="/frontoffice/projects" class="menu-link">
        <i class="menu-icon tf-icons bx bx-briefcase-alt-2"></i>
        <div>Projects</div>
      </a>
    </li>
    <li class="menu-item" routerLinkActive="active">
      <a routerLink="/frontoffice/messages" class="menu-link">
        <i class="menu-icon tf-icons bx bx-chat"></i>
        <div>Messages</div>
      </a>
    </li>
    <li class="menu-item" routerLinkActive="active">
      <a routerLink="/frontoffice/tasks" class="menu-link">
        <i class="menu-icon tf-icons bx bx-task"></i>
        <div>Tasks</div>
      </a>
    </li>
    <li class="menu-item" routerLinkActive="active">
      <a routerLink="/frontoffice/activity" class="menu-link">
        <i class="menu-icon tf-icons bx bx-pulse"></i>
        <div>Activity</div>
      </a>
    </li>
    <li class="menu-item" routerLinkActive="active">
      <a routerLink="/frontoffice/search" class="menu-link">
        <i class="menu-icon tf-icons bx bx-search-alt-2"></i>
        <div>Search</div>
      </a>
    </li>
    <li class="menu-item" routerLinkActive="active">
      <a routerLink="/frontoffice/profile" class="menu-link">
        <i class="menu-icon tf-icons bx bx-user"></i>
        <div>Profile</div>
      </a>
    </li>

    <li class="menu-header small text-uppercase">
      <span class="menu-header-text">Workspace</span>
    </li>

    <li class="menu-item" *ngIf="isAdmin">
      <a routerLink="/admin/dashboard" class="menu-link">
        <i class="menu-icon tf-icons bx bx-shield-quarter"></i>
        <div>Backoffice Admin</div>
      </a>
    </li>
  </ul>
</aside>
