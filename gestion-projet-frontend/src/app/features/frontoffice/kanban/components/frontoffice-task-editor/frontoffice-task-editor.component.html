<div class="fte-overlay" (click)="onOverlayClick($event)">
  <div class="fte-panel">
    <div class="fte-header">
      <div>
        <span class="fte-kicker">Task workspace</span>
        <h3>Ouvrir la tache</h3>
        <p>Consulte et modifie la tache dans une fenetre frontoffice plus claire et plus moderne.</p>
      </div>
      <button type="button" class="fte-close" (click)="close.emit()">×</button>
    </div>

    <form class="fte-form" #taskForm="ngForm" (ngSubmit)="save()">
      <div class="fte-grid">
        <label class="fte-field fte-field-full">
          <span>Titre</span>
          <input [(ngModel)]="form.title" name="title" required minlength="3" maxlength="120" />
        </label>

        <label class="fte-field fte-field-full">
          <span>Description</span>
          <textarea [(ngModel)]="form.description" name="description" rows="4" maxlength="2000"></textarea>
        </label>

        <label class="fte-field">
          <span>Echeance</span>
          <input [(ngModel)]="form.dueDate" name="dueDate" type="date" />
        </label>

        <label class="fte-field">
          <span>Charge estimee (h)</span>
          <input [(ngModel)]="form.estimatedHours" name="estimatedHours" type="number" min="1" max="500" />
        </label>

        <label class="fte-field" *ngIf="canManageTasks">
          <span>Assignee a</span>
          <select [(ngModel)]="form.assignedUserId" name="assignedUserId">
            <option [ngValue]="null">Non assignee</option>
            <option *ngFor="let user of users" [ngValue]="user.id">{{ user.firstName }} {{ user.lastName }}</option>
          </select>
        </label>

        <label class="fte-field">
          <span>Sous-tache de</span>
          <select [(ngModel)]="form.parentTaskId" name="parentTaskId">
            <option [ngValue]="null">Aucune</option>
            <option *ngFor="let item of availableTasks" [ngValue]="item.id">{{ item.title }}</option>
          </select>
        </label>

        <label class="fte-field">
          <span>Depend de</span>
          <select [(ngModel)]="form.dependsOnId" name="dependsOnId">
            <option [ngValue]="null">Aucune</option>
            <option *ngFor="let item of availableTasks" [ngValue]="item.id">{{ item.title }}</option>
          </select>
        </label>

        <label class="fte-field fte-field-full">
          <span>Statut</span>
          <div class="fte-statuses">
            <button *ngFor="let status of statuses" type="button" class="fte-status-btn" [class.active]="form.status === status.value" (click)="form.status = status.value">
              {{ status.label }}
            </button>
          </div>
        </label>
      </div>

      <div class="fte-feedback success" *ngIf="successMessage">{{ successMessage }}</div>
      <div class="fte-feedback error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <div class="fte-actions">
        <button type="button" class="fte-cancel" (click)="close.emit()">Fermer</button>
        <button type="submit" class="fte-submit" [disabled]="taskForm.invalid || loading">
          {{ loading ? 'Enregistrement...' : 'Enregistrer' }}
        </button>
      </div>
    </form>
  </div>
</div>
