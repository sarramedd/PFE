<div class="op-overlay" (click)="onOverlayClick($event)">
  <div class="op-panel">
    <div class="op-header">
      <div class="op-header-left">
        <div class="op-icon-badge">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 21h18"/>
            <path d="M5 21V7l7-4 7 4v14"/>
            <path d="M9 9h6"/>
            <path d="M9 13h6"/>
          </svg>
        </div>
        <div>
          <h4 class="op-title">{{ organization ? 'Edit Organization' : 'Add Organization' }}</h4>
          <p class="op-subtitle">Create or update an organization with its logo</p>
        </div>
      </div>
      <button class="op-close" type="button" (click)="close.emit()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <form class="op-form" (ngSubmit)="save()">
      <div class="op-field">
        <label class="op-label" for="organizationName">Name</label>
        <input id="organizationName" class="op-input" [(ngModel)]="form.name" name="name" required minlength="2" maxlength="80" placeholder="Organization name" />
        <span class="op-hint" *ngIf="formSubmitted && (!form.name?.trim() || form.name!.trim().length < 2)">Le nom doit contenir au moins 2 caracteres.</span>
      </div>

      <div class="op-field">
        <label class="op-label" for="organizationDescription">Description</label>
        <textarea
          id="organizationDescription"
          class="op-input op-textarea"
          [(ngModel)]="form.description"
          name="description"
          rows="4"
          maxlength="300"
          placeholder="Describe this organization"
        ></textarea>
        <span class="op-hint" *ngIf="!hasValidDescription()">La description ne doit pas depasser 300 caracteres.</span>
      </div>

      <div class="op-field">
        <label class="op-label" for="organizationLogo">Logo</label>
        <input id="organizationLogo" class="op-input op-file" type="file" accept="image/*" (change)="onLogoSelected($event)" />
        <span class="op-hint">PNG, JPG, JPEG, SVG or WEBP.</span>
      </div>

      <div class="op-preview" *ngIf="logoPreviewUrl">
        <span class="op-preview-label">Logo preview</span>
        <img [src]="logoPreviewUrl" alt="Organization logo preview" class="op-preview-image" />
      </div>

      <div class="op-feedback op-feedback-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="op-actions">
        <button type="button" class="op-btn-cancel" (click)="close.emit()">Cancel</button>
        <button type="submit" class="op-btn-submit" [disabled]="isSaving || !form.name?.trim() || !hasValidDescription()">
          {{ organization ? 'Update Organization' : 'Create Organization' }}
        </button>
      </div>
    </form>
  </div>
</div>
