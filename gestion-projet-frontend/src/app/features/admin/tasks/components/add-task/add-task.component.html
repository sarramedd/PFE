<!-- Overlay -->
<div class="at-overlay" (click)="onOverlayClick($event)">
  <div class="at-panel">

    <!-- Header -->
    <div class="at-header">
      <div class="at-header-left">
        <div class="at-icon-badge">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
        </div>
        <div>
          <h4 class="at-title">New Task</h4>
          <p class="at-subtitle">Add a task to the board</p>
        </div>
      </div>
      <button class="at-close" (click)="close.emit()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <form class="at-form" (ngSubmit)="addTask()" #addForm="ngForm">

      <!-- Title -->
      <div class="at-field">
        <label class="at-label">Title *</label>
        <div class="at-input-wrap">
          <svg class="at-input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="21" y1="6" x2="3" y2="6"/><line x1="15" y1="12" x2="3" y2="12"/><line x1="17" y1="18" x2="3" y2="18"/>
          </svg>
          <input type="text" class="at-input"
            [(ngModel)]="task.title" name="title"
            placeholder="Task title" required minlength="3" maxlength="120"
            #title="ngModel" [class.at-input-error]="title.invalid && title.touched">
        </div>
        <span class="at-error" *ngIf="title.invalid && title.touched">3 a 120 caracteres requis</span>
      </div>

      <!-- Description -->
      <div class="at-field">
        <label class="at-label">Description</label>
        <textarea class="at-input at-textarea"
          [(ngModel)]="task.description" name="description"
          placeholder="Describe the task..." rows="3" maxlength="2000">
        </textarea>
      </div>

      <!-- Status + Due date -->
      <div class="at-grid-2">
        <div class="at-field">
          <label class="at-label">Status</label>
          <div class="at-status-group">
            <button type="button" *ngFor="let s of statuses"
              class="at-status-btn"
              [class.at-status-active]="task.status === s.value"
              [ngClass]="'at-s-' + s.css"
              (click)="task.status = s.value">
              <span class="at-status-dot"></span>{{ s.label }}
            </button>
          </div>
        </div>

        <div class="at-field">
          <label class="at-label">Due Date</label>
          <div class="at-input-wrap">
            <svg class="at-input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <input type="date" class="at-input" [(ngModel)]="task.dueDate" name="dueDate" [min]="today">
          </div>
          <span class="at-error" *ngIf="task.dueDate && !hasValidDueDate()">La date d'echeance ne peut pas etre dans le passe</span>
        </div>
      </div>

      <!-- Assign user -->
      <div class="at-field" *ngIf="!hideAssignedUser">
        <label class="at-label">Assign To</label>
        <div class="at-input-wrap">
          <svg class="at-input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <select class="at-input at-select" [(ngModel)]="task.assignedUserId" name="assignedUserId">
            <option [ngValue]="null">Unassigned</option>
            <option *ngFor="let u of users" [ngValue]="u.id">
              {{ u.firstName }} {{ u.lastName }}
            </option>
          </select>
        </div>
      </div>

      <div class="at-field" *ngIf="hideAssignedUser">
        <label class="at-label">Assigned To</label>
        <div class="at-feedback at-feedback-success">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Cette tache sera automatiquement assignee a vous.
        </div>
      </div>

      <!-- Feedback -->
      <div class="at-feedback at-feedback-success" *ngIf="successMsg">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        {{ successMsg }}
      </div>
      <div class="at-feedback at-feedback-error" *ngIf="errorMsg">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ errorMsg }}
      </div>

      <!-- Actions -->
      <div class="at-actions">
        <button type="button" class="at-btn-cancel" (click)="close.emit()">Cancel</button>
        <button type="submit" class="at-btn-submit" [disabled]="addForm.invalid || !hasValidDueDate() || loading">
          <span *ngIf="!loading">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Create Task
          </span>
          <span *ngIf="loading" class="at-spinner"></span>
        </button>
      </div>

    </form>
  </div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap');

.at-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px); display: flex; align-items: center;
  justify-content: center; z-index: 1000; padding: 1rem;
  animation: at-fade 0.2s ease;
}
@keyframes at-fade  { from{opacity:0}to{opacity:1} }
@keyframes at-slide { from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)} }

.at-panel {
  width: 100%; max-width: 500px; background: #161a24;
  border: 1px solid #1e2533; border-radius: 20px; overflow: hidden;
  animation: at-slide 0.25s ease;
  box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(99,102,241,0.1);
}
.at-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5rem; border-bottom: 1px solid #1e2533;
  background: linear-gradient(135deg, rgba(99,102,241,0.07), transparent);
}
.at-header-left { display: flex; align-items: center; gap: 0.9rem; }
.at-icon-badge {
  width: 42px; height: 42px; border-radius: 12px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  color: #fff; flex-shrink: 0; box-shadow: 0 0 18px rgba(99,102,241,0.3);
}
.at-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; color: #f1f5f9; margin: 0 0 2px; }
.at-subtitle { font-size: 0.75rem; color: #64748b; margin: 0; }
.at-close {
  width: 32px; height: 32px; border-radius: 8px;
  background: rgba(255,255,255,0.05); border: 1px solid #1e2533;
  color: #64748b; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
}
.at-close:hover { background: rgba(239,68,68,0.15); color: #f87171; border-color: rgba(239,68,68,0.3); }

.at-form { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
.at-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.at-field { display: flex; flex-direction: column; gap: 0.4rem; }
.at-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; }
.at-input-wrap { position: relative; }
.at-input-icon { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: #475569; pointer-events: none; }
.at-input {
  width: 100%; padding: 0.65rem 0.85rem 0.65rem 2.35rem;
  background: #0d0f14; border: 1px solid #1e2533; border-radius: 10px;
  color: #e2e8f0; font-family: 'DM Sans', sans-serif; font-size: 0.875rem;
  transition: all 0.2s; outline: none; box-sizing: border-box;
}
.at-textarea { padding: 0.65rem 0.85rem; resize: vertical; min-height: 75px; }
.at-select { appearance: none; cursor: pointer; }
.at-input::placeholder { color: #334155; }
.at-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
.at-input-error { border-color: #ef4444 !important; }
.at-input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
.at-error { font-size: 0.7rem; color: #f87171; font-weight: 500; }

.at-status-group { display: flex; flex-direction: column; gap: 0.4rem; }
.at-status-btn {
  display: flex; align-items: center; gap: 0.45rem;
  padding: 0.45rem 0.75rem; background: #0d0f14;
  border: 1px solid #1e2533; border-radius: 9px;
  color: #64748b; font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: all 0.12s;
}
.at-status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.at-status-active { font-weight: 600 !important; }
.at-s-todo.at-status-active      { border-color: #64748b !important; background: rgba(100,116,139,0.1) !important; color: #94a3b8 !important; }
.at-s-progress.at-status-active  { border-color: #0ea5e9 !important; background: rgba(14,165,233,0.1)  !important; color: #38bdf8 !important; }
.at-s-done.at-status-active      { border-color: #10b981 !important; background: rgba(16,185,129,0.1)  !important; color: #34d399 !important; }

.at-feedback { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 0.85rem; border-radius: 9px; font-size: 0.78rem; font-weight: 500; }
.at-feedback-success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); color: #34d399; }
.at-feedback-error   { background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.2);  color: #f87171; }

.at-actions { display: flex; gap: 0.75rem; padding-top: 0.25rem; }
.at-btn-cancel {
  flex: 1; padding: 0.7rem; background: transparent;
  border: 1px solid #1e2533; border-radius: 10px; color: #94a3b8;
  font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.at-btn-cancel:hover { background: rgba(255,255,255,0.05); color: #e2e8f0; }
.at-btn-submit {
  flex: 2; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  padding: 0.7rem; background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border: none; border-radius: 10px; color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(99,102,241,0.35);
}
.at-btn-submit:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.5); }
.at-btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
.at-spinner { width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:at-spin 0.6s linear infinite;display:inline-block; }
@keyframes at-spin { to{transform:rotate(360deg)} }
</style>
