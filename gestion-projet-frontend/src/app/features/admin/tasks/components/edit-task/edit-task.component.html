<!-- Overlay -->
<div class="et-overlay" (click)="onOverlayClick($event)">
  <div class="et-panel">

    <!-- Header -->
    <div class="et-header">
      <div class="et-header-left">
        <div class="et-icon-badge">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </div>
        <div>
          <h4 class="et-title">Edit Task</h4>
          <p class="et-subtitle">{{ task?.title }}</p>
        </div>
      </div>
      <button class="et-close" (click)="cancel()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <form class="et-form" #editForm="ngForm">

      <!-- Title -->
      <div class="et-field">
        <label class="et-label">Title *</label>
        <div class="et-input-wrap">
          <svg class="et-input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="21" y1="6" x2="3" y2="6"/><line x1="15" y1="12" x2="3" y2="12"/><line x1="17" y1="18" x2="3" y2="18"/>
          </svg>
          <input type="text" class="et-input"
            [(ngModel)]="editTask.title" name="title"
            placeholder="Task title" required minlength="3" maxlength="120"
            #title="ngModel" [class.et-input-error]="title.invalid && title.touched">
        </div>
        <span class="et-error" *ngIf="title.invalid && title.touched">3 a 120 caracteres requis</span>
      </div>

      <!-- Description -->
      <div class="et-field">
        <label class="et-label">Description</label>
        <textarea class="et-input et-textarea"
          [(ngModel)]="editTask.description" name="description"
          placeholder="Describe the task..." rows="3" maxlength="2000">
        </textarea>
      </div>

      <!-- Status + Due date -->
      <div class="et-grid-2">
        <div class="et-field">
          <label class="et-label">Status</label>
          <div class="et-status-group">
            <button type="button" *ngFor="let s of statuses"
              class="et-status-btn"
              [class.et-status-active]="editTask.status === s.value"
              [ngClass]="'et-s-' + s.css"
              (click)="editTask.status = s.value">
              <span class="et-status-dot"></span>{{ s.label }}
            </button>
          </div>
        </div>

        <div class="et-field">
          <label class="et-label">Due Date</label>
          <div class="et-input-wrap">
            <svg class="et-input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <input type="date" class="et-input" [(ngModel)]="editTask.dueDate" name="dueDate" [min]="today">
          </div>
          <span class="et-error" *ngIf="editTask.dueDate && !hasValidDueDate()">La date d'echeance ne peut pas etre dans le passe</span>
        </div>
      </div>

      <!-- Assign user -->
      <div class="et-field">
        <label class="et-label">Assign To</label>
        <div class="et-input-wrap">
          <svg class="et-input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <select class="et-input et-select" [(ngModel)]="editTask.assignedUserId" name="assignedUserId">
            <option [ngValue]="null">Unassigned</option>
            <option *ngFor="let u of users" [ngValue]="u.id">
              {{ u.firstName }} {{ u.lastName }}
            </option>
          </select>
        </div>
      </div>

      <!-- Notice -->
      <div class="et-notice">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Changes will be reflected immediately on the board.
      </div>

      <!-- Feedback -->
      <div class="et-feedback et-feedback-success" *ngIf="successMsg">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        {{ successMsg }}
      </div>
      <div class="et-feedback et-feedback-error" *ngIf="errorMsg">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ errorMsg }}
      </div>

      <!-- Actions -->
      <div class="et-actions">
        <button type="button" class="et-btn-cancel" (click)="cancel()">Cancel</button>
        <button type="button" class="et-btn-submit" (click)="update()" [disabled]="editForm.invalid || !hasValidDueDate() || loading">
          <span *ngIf="!loading">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            Save Changes
          </span>
          <span *ngIf="loading" class="et-spinner"></span>
        </button>
      </div>

    </form>
  </div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap');

.et-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;animation:et-fade 0.2s ease; }
@keyframes et-fade  { from{opacity:0}to{opacity:1} }
@keyframes et-slide { from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)} }
.et-panel { width:100%;max-width:500px;background:#161a24;border:1px solid #1e2533;border-radius:20px;overflow:hidden;animation:et-slide 0.25s ease;box-shadow:0 25px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(99,102,241,0.1); }
.et-header { display:flex;align-items:center;justify-content:space-between;padding:1.5rem;border-bottom:1px solid #1e2533;background:linear-gradient(135deg,rgba(99,102,241,0.07),transparent); }
.et-header-left { display:flex;align-items:center;gap:0.9rem; }
.et-icon-badge { width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#8b5cf6,#6366f1);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;box-shadow:0 0 18px rgba(139,92,246,0.3); }
.et-title { font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;color:#f1f5f9;margin:0 0 2px; }
.et-subtitle { font-size:0.75rem;color:#64748b;margin:0; }
.et-close { width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid #1e2533;color:#64748b;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s; }
.et-close:hover { background:rgba(239,68,68,0.15);color:#f87171;border-color:rgba(239,68,68,0.3); }
.et-form { padding:1.5rem;display:flex;flex-direction:column;gap:1rem; }
.et-grid-2 { display:grid;grid-template-columns:1fr 1fr;gap:1rem; }
.et-field { display:flex;flex-direction:column;gap:0.4rem; }
.et-label { font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#64748b; }
.et-input-wrap { position:relative; }
.et-input-icon { position:absolute;left:0.85rem;top:50%;transform:translateY(-50%);color:#475569;pointer-events:none; }
.et-input { width:100%;padding:0.65rem 0.85rem 0.65rem 2.35rem;background:#0d0f14;border:1px solid #1e2533;border-radius:10px;color:#e2e8f0;font-family:'DM Sans',sans-serif;font-size:0.875rem;transition:all 0.2s;outline:none;box-sizing:border-box; }
.et-textarea { padding:0.65rem 0.85rem;resize:vertical;min-height:75px; }
.et-select { appearance:none;cursor:pointer; }
.et-input::placeholder { color:#334155; }
.et-input:focus { border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,0.15); }
.et-input-error { border-color:#ef4444 !important; }
.et-input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(0.5);cursor:pointer; }
.et-error { font-size:0.7rem;color:#f87171;font-weight:500; }
.et-status-group { display:flex;flex-direction:column;gap:0.4rem; }
.et-status-btn { display:flex;align-items:center;gap:0.45rem;padding:0.45rem 0.75rem;background:#0d0f14;border:1px solid #1e2533;border-radius:9px;color:#64748b;font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;cursor:pointer;transition:all 0.12s; }
.et-status-dot { width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0; }
.et-status-active { font-weight:600 !important; }
.et-s-todo.et-status-active     { border-color:#64748b !important;background:rgba(100,116,139,0.1) !important;color:#94a3b8 !important; }
.et-s-progress.et-status-active { border-color:#0ea5e9 !important;background:rgba(14,165,233,0.1)  !important;color:#38bdf8 !important; }
.et-s-done.et-status-active     { border-color:#10b981 !important;background:rgba(16,185,129,0.1)  !important;color:#34d399 !important; }
.et-notice { display:flex;align-items:center;gap:0.5rem;padding:0.6rem 0.9rem;background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.2);border-radius:9px;color:#f59e0b;font-size:0.75rem;font-weight:500; }
.et-feedback { display:flex;align-items:center;gap:0.5rem;padding:0.6rem 0.85rem;border-radius:9px;font-size:0.78rem;font-weight:500; }
.et-feedback-success { background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);color:#34d399; }
.et-feedback-error   { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); color:#f87171; }
.et-actions { display:flex;gap:0.75rem;padding-top:0.25rem; }
.et-btn-cancel { flex:1;padding:0.7rem;background:transparent;border:1px solid #1e2533;border-radius:10px;color:#94a3b8;font-family:'DM Sans',sans-serif;font-size:0.875rem;font-weight:500;cursor:pointer;transition:all 0.15s; }
.et-btn-cancel:hover { background:rgba(255,255,255,0.05);color:#e2e8f0; }
.et-btn-submit { flex:2;display:flex;align-items:center;justify-content:center;gap:0.4rem;padding:0.7rem;background:linear-gradient(135deg,#8b5cf6,#6366f1);border:none;border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:0.875rem;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 15px rgba(139,92,246,0.35); }
.et-btn-submit:hover:not(:disabled) { transform:translateY(-1px);box-shadow:0 6px 20px rgba(139,92,246,0.5); }
.et-btn-submit:disabled { opacity:0.5;cursor:not-allowed; }
.et-spinner { width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:et-spin 0.6s linear infinite;display:inline-block; }
@keyframes et-spin { to{transform:rotate(360deg)} }
</style>
