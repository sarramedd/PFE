<!-- Overlay -->
<div class="ap-overlay" (click)="onOverlayClick($event)">
  <div class="ap-panel">

    <!-- Header -->
    <div class="ap-header">
      <div class="ap-header-left">
        <div class="ap-icon-badge">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </div>
        <div>
          <h4 class="ap-title">New Project</h4>
          <p class="ap-subtitle">Fill in the details to create a project</p>
        </div>
      </div>
      <button class="ap-close" (click)="close.emit()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Form -->
    <form class="ap-form" (ngSubmit)="addProject()" #addForm="ngForm">

      <!-- Name -->
      <div class="ap-field">
        <label class="ap-label">Project Name</label>
        <div class="ap-input-wrap">
          <svg class="ap-input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <input type="text" class="ap-input"
            [(ngModel)]="project.name" name="name"
            placeholder="e.g. Website Redesign" required minlength="3" maxlength="100"
            #name="ngModel" [class.ap-input-error]="name.invalid && name.touched">
        </div>
        <span class="ap-error" *ngIf="name.invalid && name.touched">3 a 100 caracteres requis</span>
      </div>

      <!-- Description -->
      <div class="ap-field">
        <label class="ap-label">Description</label>
        <div class="ap-input-wrap">
          <textarea class="ap-input ap-textarea"
            [(ngModel)]="project.description" name="description"
            placeholder="Brief description of the project..." rows="3" maxlength="1000">
          </textarea>
        </div>
      </div>

      <!-- Dates -->
      <div class="ap-grid-2">
        <div class="ap-field">
          <label class="ap-label">Start Date</label>
          <div class="ap-input-wrap">
            <svg class="ap-input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <input type="date" class="ap-input"
              [(ngModel)]="project.startDate" name="startDate">
          </div>
        </div>

        <div class="ap-field">
          <label class="ap-label">End Date</label>
          <div class="ap-input-wrap">
            <svg class="ap-input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <input type="date" class="ap-input"
              [(ngModel)]="project.endDate" name="endDate">
          </div>
          <span class="ap-error" *ngIf="project.startDate && project.endDate && !hasValidDates()">End date must be after start date</span>
        </div>
      </div>

      <!-- Status -->
      <div class="ap-field">
        <label class="ap-label">Status</label>
        <div class="ap-status-group">
          <button type="button" *ngFor="let s of statuses"
            class="ap-status-btn"
            [class.ap-status-active]="project.status === s.value"
            [ngClass]="'ap-status-' + s.css"
            (click)="project.status = s.value">
            <span class="ap-status-dot"></span>
            {{ s.label }}
          </button>
        </div>
      </div>

      <!-- Feedback -->
      <div class="ap-feedback ap-feedback-success" *ngIf="successMsg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        {{ successMsg }}
      </div>
      <div class="ap-feedback ap-feedback-error" *ngIf="errorMsg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ errorMsg }}
      </div>

      <!-- Actions -->
      <div class="ap-actions">
        <button type="button" class="ap-btn-cancel" (click)="close.emit()">Cancel</button>
        <button type="submit" class="ap-btn-submit" [disabled]="addForm.invalid || !hasValidDates() || loading">
          <span *ngIf="!loading">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Create Project
          </span>
          <span *ngIf="loading" class="ap-spinner"></span>
        </button>
      </div>

    </form>
  </div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap');

.ap-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px); display: flex; align-items: center;
  justify-content: center; z-index: 1000; padding: 1rem;
  animation: ap-fade 0.2s ease;
}
@keyframes ap-fade  { from { opacity: 0; } to { opacity: 1; } }
@keyframes ap-slide { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

.ap-panel {
  width: 100%; max-width: 520px;
  background: #161a24; border: 1px solid #1e2533; border-radius: 20px;
  overflow: hidden; animation: ap-slide 0.25s ease;
  box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(14,165,233,0.1);
}
.ap-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5rem; border-bottom: 1px solid #1e2533;
  background: linear-gradient(135deg, rgba(14,165,233,0.07), transparent);
}
.ap-header-left { display: flex; align-items: center; gap: 0.9rem; }
.ap-icon-badge {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, #0ea5e9, #6366f1);
  display: flex; align-items: center; justify-content: center;
  color: #fff; flex-shrink: 0; box-shadow: 0 0 20px rgba(14,165,233,0.3);
}
.ap-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; color: #f1f5f9; margin: 0 0 2px; }
.ap-subtitle { font-size: 0.75rem; color: #64748b; margin: 0; }
.ap-close {
  width: 32px; height: 32px; border-radius: 8px;
  background: rgba(255,255,255,0.05); border: 1px solid #1e2533;
  color: #64748b; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.ap-close:hover { background: rgba(239,68,68,0.15); color: #f87171; border-color: rgba(239,68,68,0.3); }

.ap-form { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
.ap-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.ap-field { display: flex; flex-direction: column; gap: 0.4rem; }
.ap-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; }
.ap-input-wrap { position: relative; }
.ap-input-icon { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: #475569; pointer-events: none; }
.ap-input {
  width: 100%; padding: 0.65rem 0.85rem 0.65rem 2.35rem;
  background: #0d0f14; border: 1px solid #1e2533; border-radius: 10px;
  color: #e2e8f0; font-family: 'DM Sans', sans-serif; font-size: 0.875rem;
  transition: all 0.2s; outline: none; box-sizing: border-box;
}
.ap-textarea { padding: 0.65rem 0.85rem; resize: vertical; min-height: 80px; }
.ap-input::placeholder { color: #334155; }
.ap-input:focus { border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14,165,233,0.15); }
.ap-input-error { border-color: #ef4444 !important; box-shadow: 0 0 0 3px rgba(239,68,68,0.12) !important; }
.ap-error { font-size: 0.7rem; color: #f87171; font-weight: 500; }

/* Date input styling */
.ap-input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

/* Status buttons */
.ap-status-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.ap-status-btn {
  flex: 1; min-width: 90px;
  display: flex; align-items: center; justify-content: center; gap: 0.45rem;
  padding: 0.55rem 0.75rem;
  background: #0d0f14; border: 1px solid #1e2533; border-radius: 10px;
  color: #64748b; font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.ap-status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.ap-status-btn:hover { border-color: #0ea5e9; color: #e2e8f0; }
.ap-status-active { font-weight: 600 !important; }
.ap-status-planned.ap-status-active    { border-color: #64748b !important; background: rgba(100,116,139,0.1) !important; color: #94a3b8 !important; }
.ap-status-progress.ap-status-active   { border-color: #0ea5e9 !important; background: rgba(14,165,233,0.1) !important; color: #38bdf8 !important; }
.ap-status-completed.ap-status-active  { border-color: #10b981 !important; background: rgba(16,185,129,0.1) !important; color: #34d399 !important; }
.ap-status-cancelled.ap-status-active  { border-color: #ef4444 !important; background: rgba(239,68,68,0.1) !important; color: #f87171 !important; }

.ap-feedback { display: flex; align-items: center; gap: 0.5rem; padding: 0.65rem 0.9rem; border-radius: 9px; font-size: 0.8rem; font-weight: 500; }
.ap-feedback-success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); color: #34d399; }
.ap-feedback-error   { background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.2);  color: #f87171; }

.ap-actions { display: flex; gap: 0.75rem; padding-top: 0.25rem; }
.ap-btn-cancel {
  flex: 1; padding: 0.7rem; background: transparent;
  border: 1px solid #1e2533; border-radius: 10px; color: #94a3b8;
  font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.ap-btn-cancel:hover { background: rgba(255,255,255,0.05); color: #e2e8f0; }
.ap-btn-submit {
  flex: 2; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  padding: 0.7rem; background: linear-gradient(135deg, #0ea5e9, #6366f1);
  border: none; border-radius: 10px; color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(14,165,233,0.35);
}
.ap-btn-submit:hover:not(:disabled)  { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(14,165,233,0.5); }
.ap-btn-submit:active:not(:disabled) { transform: translateY(0); }
.ap-btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
.ap-spinner {
  width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%;
  animation: ap-spin 0.6s linear infinite; display: inline-block;
}
@keyframes ap-spin { to { transform: rotate(360deg); } }
</style>
