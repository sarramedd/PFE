<!-- Overlay -->
<div class="ep-overlay" (click)="onOverlayClick($event)">
  <div class="ep-panel">

    <!-- Header -->
    <div class="ep-header">
      <div class="ep-header-left">
        <div class="ep-project-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </div>
        <div>
          <h4 class="ep-title">Edit Project</h4>
          <p class="ep-subtitle">{{ project?.name }}</p>
        </div>
      </div>
      <button class="ep-close" (click)="cancel()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Section label -->
    <div class="ep-section-label">
      <span>Project Details</span>
      <div class="ep-divider"></div>
    </div>

    <!-- Form -->
    <form class="ep-form" #editForm="ngForm">

      <!-- Name -->
      <div class="ep-field">
        <label class="ep-label">Project Name</label>
        <div class="ep-input-wrap">
          <svg class="ep-input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <input type="text" class="ep-input"
            [(ngModel)]="project.name" name="name"
            placeholder="Project name" required
            #name="ngModel" [class.ep-input-error]="name.invalid && name.touched">
        </div>
        <span class="ep-error" *ngIf="name.invalid && name.touched">Required</span>
      </div>

      <!-- Description -->
      <div class="ep-field">
        <label class="ep-label">Description</label>
        <textarea class="ep-input ep-textarea"
          [(ngModel)]="project.description" name="description"
          placeholder="Project description..." rows="3">
        </textarea>
      </div>

      <!-- Dates -->
      <div class="ep-grid-2">
        <div class="ep-field">
          <label class="ep-label">Start Date</label>
          <div class="ep-input-wrap">
            <svg class="ep-input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <input type="date" class="ep-input" [(ngModel)]="project.startDate" name="startDate">
          </div>
        </div>
        <div class="ep-field">
          <label class="ep-label">End Date</label>
          <div class="ep-input-wrap">
            <svg class="ep-input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <input type="date" class="ep-input" [(ngModel)]="project.endDate" name="endDate">
          </div>
        </div>
      </div>

      <!-- Status -->
      <div class="ep-field">
        <label class="ep-label">Status</label>
        <div class="ep-status-group">
          <button type="button" *ngFor="let s of statuses"
            class="ep-status-btn"
            [class.ep-status-active]="project.status === s.value"
            [ngClass]="'ep-status-' + s.css"
            (click)="project.status = s.value">
            <span class="ep-status-dot"></span>
            {{ s.label }}
          </button>
        </div>
      </div>

      <!-- Notice -->
      <div class="ep-notice">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Changes will take effect immediately upon saving.
      </div>

      <!-- Feedback -->
      <div class="ep-feedback ep-feedback-success" *ngIf="successMsg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        {{ successMsg }}
      </div>
      <div class="ep-feedback ep-feedback-error" *ngIf="errorMsg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ errorMsg }}
      </div>

      <!-- Actions -->
      <div class="ep-actions">
        <button type="button" class="ep-btn-cancel" (click)="cancel()">Cancel</button>
        <button type="button" class="ep-btn-save" (click)="update()" [disabled]="editForm.invalid || loading">
          <span *ngIf="!loading">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            Save Changes
          </span>
          <span *ngIf="loading" class="ep-spinner"></span>
        </button>
      </div>

    </form>
  </div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap');

.ep-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px); display: flex; align-items: center;
  justify-content: center; z-index: 1000; padding: 1rem;
  animation: ep-fade 0.2s ease;
}
@keyframes ep-fade  { from { opacity: 0; } to { opacity: 1; } }
@keyframes ep-slide { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

.ep-panel {
  width: 100%; max-width: 520px;
  background: #161a24; border: 1px solid #1e2533; border-radius: 20px;
  overflow: hidden; animation: ep-slide 0.25s ease;
  box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(14,165,233,0.1);
}
.ep-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5rem; border-bottom: 1px solid #1e2533;
  background: linear-gradient(135deg, rgba(14,165,233,0.07), transparent);
}
.ep-header-left { display: flex; align-items: center; gap: 0.9rem; }
.ep-project-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, #0ea5e9, #6366f1);
  display: flex; align-items: center; justify-content: center;
  color: #fff; flex-shrink: 0; box-shadow: 0 0 20px rgba(14,165,233,0.3);
}
.ep-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; color: #f1f5f9; margin: 0 0 2px; }
.ep-subtitle { font-size: 0.75rem; color: #64748b; margin: 0; }
.ep-close {
  width: 32px; height: 32px; border-radius: 8px;
  background: rgba(255,255,255,0.05); border: 1px solid #1e2533;
  color: #64748b; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.ep-close:hover { background: rgba(239,68,68,0.15); color: #f87171; border-color: rgba(239,68,68,0.3); }

.ep-section-label {
  display: flex; align-items: center; gap: 0.75rem; padding: 1rem 1.5rem 0;
}
.ep-section-label span {
  font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: #475569; white-space: nowrap;
}
.ep-divider { flex: 1; height: 1px; background: #1e2533; }

.ep-form { padding: 1.25rem 1.5rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
.ep-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.ep-field { display: flex; flex-direction: column; gap: 0.4rem; }
.ep-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; }
.ep-input-wrap { position: relative; }
.ep-input-icon { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: #475569; pointer-events: none; }
.ep-input {
  width: 100%; padding: 0.65rem 0.85rem 0.65rem 2.35rem;
  background: #0d0f14; border: 1px solid #1e2533; border-radius: 10px;
  color: #e2e8f0; font-family: 'DM Sans', sans-serif; font-size: 0.875rem;
  transition: all 0.2s; outline: none; box-sizing: border-box;
}
.ep-textarea { padding: 0.65rem 0.85rem; resize: vertical; min-height: 80px; }
.ep-input::placeholder { color: #334155; }
.ep-input:focus { border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14,165,233,0.15); }
.ep-input-error { border-color: #ef4444 !important; }
.ep-error { font-size: 0.7rem; color: #f87171; font-weight: 500; }
.ep-input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

.ep-status-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.ep-status-btn {
  flex: 1; min-width: 90px;
  display: flex; align-items: center; justify-content: center; gap: 0.45rem;
  padding: 0.55rem 0.75rem; background: #0d0f14; border: 1px solid #1e2533;
  border-radius: 10px; color: #64748b; font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.ep-status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.ep-status-active { font-weight: 600 !important; }
.ep-status-planned.ep-status-active    { border-color: #64748b !important; background: rgba(100,116,139,0.1) !important; color: #94a3b8 !important; }
.ep-status-progress.ep-status-active   { border-color: #0ea5e9 !important; background: rgba(14,165,233,0.1)  !important; color: #38bdf8 !important; }
.ep-status-completed.ep-status-active  { border-color: #10b981 !important; background: rgba(16,185,129,0.1)  !important; color: #34d399 !important; }
.ep-status-cancelled.ep-status-active  { border-color: #ef4444 !important; background: rgba(239,68,68,0.1)   !important; color: #f87171 !important; }

.ep-notice {
  display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 0.9rem;
  background: rgba(245,158,11,0.07); border: 1px solid rgba(245,158,11,0.2);
  border-radius: 9px; color: #f59e0b; font-size: 0.75rem; font-weight: 500;
}
.ep-feedback { display: flex; align-items: center; gap: 0.5rem; padding: 0.65rem 0.9rem; border-radius: 9px; font-size: 0.8rem; font-weight: 500; }
.ep-feedback-success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); color: #34d399; }
.ep-feedback-error   { background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.2);  color: #f87171; }

.ep-actions { display: flex; gap: 0.75rem; padding-top: 0.25rem; }
.ep-btn-cancel {
  flex: 1; padding: 0.7rem; background: transparent; border: 1px solid #1e2533;
  border-radius: 10px; color: #94a3b8; font-family: 'DM Sans', sans-serif;
  font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.ep-btn-cancel:hover { background: rgba(255,255,255,0.05); color: #e2e8f0; }
.ep-btn-save {
  flex: 2; display: flex; align-items: center; justify-content: center; gap: 0.4rem;
  padding: 0.7rem; background: linear-gradient(135deg, #0ea5e9, #6366f1);
  border: none; border-radius: 10px; color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(14,165,233,0.35);
}
.ep-btn-save:hover:not(:disabled)  { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(14,165,233,0.5); }
.ep-btn-save:active:not(:disabled) { transform: translateY(0); }
.ep-btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
.ep-spinner {
  width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%;
  animation: ep-spin 0.6s linear infinite; display: inline-block;
}
@keyframes ep-spin { to { transform: rotate(360deg); } }
</style>
