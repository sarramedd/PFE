services:

  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestionprojet
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./GestionProjet
    container_name: spring-backend
    restart: always
    ports:
      - "8088:8088"
    depends_on:
      - mysql
    environment:
      # En Docker, le hostname du service MySQL est "mysql" (pas localhost).
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gestionprojet?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      # Cle Gemini (gratuite). Laisser vide = fallback heuristique.
      APP_AI_API_KEY: ${APP_AI_API_KEY:-}
    volumes:
      - ./GestionProjet/uploads:/app/uploads

  frontend:
    build:
      context: ./gestion-projet-frontend
    container_name: angular-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
